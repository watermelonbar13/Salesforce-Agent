<template>
    <article class="slds-card history-root">
        <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                    <lightning-icon icon-name="utility:timeline" size="small" alternative-text="이력"></lightning-icon>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">영업활동 이력 어시스턴트</h2>
                    <p class="slds-text-body_small slds-text-color_weak">이전 활동을 기반으로 AI 영업전략을 제공합니다.</p>
                </div>
            </header>
        </div>

        <div class="slds-card__body slds-card__body_inner">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="불러오는 중..." size="medium"></lightning-spinner>
            </template>

            <template if:true={error}>
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    <span class="slds-assistive-text">오류</span>
                    <span>{error}</span>
                </div>
            </template>

            <template if:true={hasActivities}>
                <ul class="timeline-list">
                    <template for:each={activities} for:item="item">
                        <li key={item.id} class="timeline-item slds-p-around_small">
                            <p class="slds-text-title_bold">{item.subject}</p>
                            <p class="slds-text-body_small slds-text-color_weak">{item.activityDate}</p>
                            <p class="slds-text-body_regular">{item.activityContent}</p>
                        </li>
                    </template>
                </ul>
            </template>
            <template if:false={hasActivities}>
                <p class="slds-text-body_small slds-text-color_weak">조회된 이전 영업활동이 없습니다.</p>
            </template>

            <div class="slds-m-top_medium">
                <lightning-button
                    label="AI 전략 분석"
                    variant="brand"
                    onclick={handleAnalyzeStrategy}
                    disabled={isAnalyzing}
                ></lightning-button>
            </div>

            <template if:true={isAnalyzing}>
                <lightning-spinner alternative-text="전략 분석 중..." size="medium"></lightning-spinner>
            </template>

            <template if:true={hasStrategy}>
                <lightning-textarea
                    class="slds-m-top_medium"
                    label="AI 영업전략"
                    value={strategyText}
                    readonly
                ></lightning-textarea>
            </template>
        </div>
    </article>
</template>
